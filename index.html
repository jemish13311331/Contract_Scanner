<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <link rel="icon" type="image/svg+xml" href="/logo-mark.svg" />
    <link rel="apple-touch-icon" href="/logo-mark.svg" />
    <meta name="theme-color" content="#fdf6ee" />

    <!-- Primary SEO -->
    <title>Contract Red-Flag Scanner — Leases, Employment, Property & More</title>
    <meta
      name="description"
      content="AI contract red-flag scanner for leases, employment offers, property purchase agreements, and any contract — plain-English risk analysis and negotiation prompts."
    />
    <meta
      name="keywords"
      content="contract red flag scanner, lease review, rental agreement checker, employment offer review, non-compete analysis, purchase agreement review, contract analysis AI, plain english contract"
    />
    <meta name="author" content="Contract Red-Flag Scanner" />
    <meta name="application-name" content="Contract Red-Flag Scanner" />
    <meta name="robots" content="index, follow, max-image-preview:large, max-snippet:-1, max-video-preview:-1" />
    <link rel="canonical" href="https://contractscanner.express/" />

    <!-- Open Graph -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="Contract Red-Flag Scanner" />
    <meta property="og:url" content="https://contractscanner.express/" />
    <meta property="og:title" content="Contract Red-Flag Scanner — Spot risky clauses before you sign" />
    <meta
      property="og:description"
      content="AI review for leases, job offers, and property contracts — plain-English risk analysis and negotiation prompts. Paste text or upload a PDF."
    />
    <meta property="og:image" content="https://contractscanner.express/og-image.png" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:image:alt" content="Contract Red-Flag Scanner — spot the risky clauses before you sign." />
    <meta property="og:locale" content="en_US" />

    <!-- Twitter -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Contract Red-Flag Scanner — Spot risky clauses before you sign" />
    <meta
      name="twitter:description"
      content="AI review for leases, job offers, and property contracts — plain-English risk analysis and negotiation prompts."
    />
    <meta name="twitter:image" content="https://contractscanner.express/og-image.png" />
    <meta name="twitter:image:alt" content="Contract Red-Flag Scanner — spot the risky clauses before you sign." />

    <!-- Structured data: the product -->
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "WebApplication",
        "name": "Contract Red-Flag Scanner",
        "url": "https://contractscanner.express/",
        "description": "AI contract red-flag scanner for leases, employment offers, property purchase agreements, and any contract — plain-English risk analysis and negotiation prompts.",
        "applicationCategory": "BusinessApplication",
        "operatingSystem": "Web",
        "browserRequirements": "Requires JavaScript. Requires HTML5.",
        "image": "https://contractscanner.express/og-image.png",
        "offers": [
          {
            "@type": "Offer",
            "name": "Starter",
            "price": "9.99",
            "priceCurrency": "USD",
            "description": "5 contract reviews for a one-off review."
          },
          {
            "@type": "Offer",
            "name": "Pro",
            "price": "49.99",
            "priceCurrency": "USD",
            "description": "50 contract reviews for an active search."
          },
          {
            "@type": "Offer",
            "name": "Unlimited",
            "price": "99.99",
            "priceCurrency": "USD",
            "description": "Unlimited contract reviews for 30 days."
          }
        ],
        "featureList": [
          "Lease and rental agreement review",
          "Employment offer and contract review",
          "Real-estate purchase agreement review",
          "General contract review",
          "PDF upload and OCR",
          "Plain-English risk analysis",
          "Negotiation prompts"
        ]
      }
    </script>

    <!-- Structured data: common questions -->
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "FAQPage",
        "mainEntity": [
          {
            "@type": "Question",
            "name": "What is a contract red-flag scanner?",
            "acceptedAnswer": {
              "@type": "Answer",
              "text": "It is an AI tool that reads a contract and surfaces one-sided or risky clauses — such as auto-renewal, liability caps, indemnification, non-competes, and termination traps — in plain English, along with the best points to negotiate."
            }
          },
          {
            "@type": "Question",
            "name": "What types of contracts can it review?",
            "acceptedAnswer": {
              "@type": "Answer",
              "text": "Leases and rental agreements, employment offers and agreements, real-estate purchase and sale agreements, and any general contract. Paste the text or upload a PDF."
            }
          },
          {
            "@type": "Question",
            "name": "Is the analysis legal advice?",
            "acceptedAnswer": {
              "@type": "Answer",
              "text": "No. The analysis is informational only and not legal advice. Confirm important terms with a licensed attorney before signing."
            }
          }
        ]
      }
    </script>

    <!-- Inter: the typeface the UI is designed around (variable, weights 400–800) -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600;14..32,700;14..32,800&display=swap"
    />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
