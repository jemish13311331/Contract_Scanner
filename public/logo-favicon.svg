<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" width="256" height="256" role="img" aria-label="Contract Scanner">
  <defs>
    <linearGradient id="tile" x1="0.2" y1="0" x2="0.8" y2="1">
      <stop offset="0%" stop-color="#f4faf9"/>
      <stop offset="100%" stop-color="#d8ebe6"/>
    </linearGradient>
    <radialGradient id="backglow" cx="36%" cy="26%" r="70%">
      <stop offset="0%" stop-color="#0d9488" stop-opacity="0.20"/>
      <stop offset="100%" stop-color="#0d9488" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="vignette" cx="50%" cy="46%" r="62%">
      <stop offset="55%" stop-color="#0f766e" stop-opacity="0"/>
      <stop offset="100%" stop-color="#0f766e" stop-opacity="0.10"/>
    </radialGradient>
    <linearGradient id="bevel" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.6"/>
      <stop offset="45%" stop-color="#ffffff" stop-opacity="0"/>
      <stop offset="100%" stop-color="#0f766e" stop-opacity="0.16"/>
    </linearGradient>
    <linearGradient id="ring" x1="0.1" y1="0" x2="0.9" y2="1">
      <stop offset="0%" stop-color="#7fe9dd"/>
      <stop offset="42%" stop-color="#12b3a3"/>
      <stop offset="100%" stop-color="#115e58"/>
    </linearGradient>
    <linearGradient id="handle" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#5eead4"/>
      <stop offset="100%" stop-color="#0f766e"/>
    </linearGradient>
    <radialGradient id="glass" cx="36%" cy="30%" r="80%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.85"/>
      <stop offset="30%" stop-color="#ffffff" stop-opacity="0.12"/>
      <stop offset="72%" stop-color="#0a1f1c" stop-opacity="0.06"/>
      <stop offset="100%" stop-color="#02110f" stop-opacity="0.4"/>
    </radialGradient>
    <linearGradient id="lens" x1="0.3" y1="0" x2="0.7" y2="1">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#d8e3de"/>
    </linearGradient>
    <radialGradient id="badge" cx="36%" cy="32%" r="72%">
      <stop offset="0%" stop-color="#ff7a92"/>
      <stop offset="55%" stop-color="#e11d3f"/>
      <stop offset="100%" stop-color="#a60d2a"/>
    </radialGradient>
    <filter id="b4" x="-60%" y="-60%" width="220%" height="220%"><feGaussianBlur stdDeviation="4"/></filter>
    <filter id="b8" x="-60%" y="-60%" width="220%" height="220%"><feGaussianBlur stdDeviation="8"/></filter>
  </defs>

  <rect width="256" height="256" rx="58" fill="url(#tile)"/>
  <rect width="256" height="256" rx="58" fill="url(#backglow)"/>

  <!-- cast shadow + teal glow -->
  <ellipse cx="128" cy="128" rx="80" ry="74" fill="#0f2a26" fill-opacity="0.18" filter="url(#b8)"/>
  <circle cx="114" cy="110" r="82" fill="#0d9488" fill-opacity="0.10" filter="url(#b8)"/>

  <!-- handle: drawn BEHIND the ring so it tucks under the rim and reads as joined -->
  <line x1="150" y1="146" x2="210" y2="206" stroke="#0f3f3a" stroke-width="30" stroke-linecap="round"/>
  <line x1="153" y1="149" x2="210" y2="206" stroke="url(#handle)" stroke-width="27" stroke-linecap="round"/>
  <line x1="182" y1="178" x2="204" y2="200" stroke="#d7fff1" stroke-opacity="0.6" stroke-width="7" stroke-linecap="round"/>

  <!-- glass dome lens -->
  <clipPath id="lc"><circle cx="114" cy="110" r="62"/></clipPath>
  <g clip-path="url(#lc)">
    <circle cx="114" cy="110" r="62" fill="url(#lens)"/>
    <path d="M82 88 H150" stroke="#79847e" stroke-width="11" stroke-linecap="round"/>
    <path d="M82 112 H152" stroke="#dc143c" stroke-width="16" stroke-linecap="round"/>
    <path d="M82 136 H134" stroke="#79847e" stroke-width="11" stroke-linecap="round"/>
    <circle cx="114" cy="110" r="62" fill="url(#glass)"/>
    <path d="M156 128 A62 62 0 0 1 96 162" fill="none" stroke="#02140f" stroke-opacity="0.3" stroke-width="18" stroke-linecap="round" filter="url(#b4)"/>
    <ellipse cx="94" cy="84" rx="13" ry="7" fill="#ffffff" fill-opacity="0.9" transform="rotate(-32 94 84)"/>
  </g>

  <!-- torus ring -->
  <circle cx="114" cy="110" r="75" fill="none" stroke="#06322e" stroke-width="4"/>
  <circle cx="114" cy="110" r="62" fill="none" stroke="#06322e" stroke-width="4"/>
  <circle cx="114" cy="110" r="68.5" fill="none" stroke="url(#ring)" stroke-width="19"/>
  <circle cx="114" cy="110" r="64" fill="none" stroke="#7fe9dd" stroke-opacity="0.32" stroke-width="5"/>
  <circle cx="114" cy="110" r="73" fill="none" stroke="#0a3d38" stroke-opacity="0.5" stroke-width="5"/>
  <path d="M66 88 A68 68 0 0 1 116 44" fill="none" stroke="#d7fff1" stroke-opacity="0.9" stroke-width="5" stroke-linecap="round"/>

  <!-- alert sphere -->
  <circle cx="192" cy="58" r="34" fill="#ff2b50" fill-opacity="0.18" filter="url(#b8)"/>
  <ellipse cx="196" cy="70" rx="22" ry="8" fill="#0f2a26" fill-opacity="0.22" filter="url(#b4)"/>
  <circle cx="190" cy="58" r="24" fill="url(#badge)" stroke="#ffffff" stroke-width="4"/>
  <ellipse cx="182" cy="49" rx="7.5" ry="5" fill="#ffffff" fill-opacity="0.75" transform="rotate(-30 182 49)"/>

  <rect width="256" height="256" rx="58" fill="url(#vignette)"/>
  <rect x="4" y="4" width="248" height="248" rx="55" fill="none" stroke="url(#bevel)" stroke-width="3.5"/>
  <rect x="1.5" y="1.5" width="253" height="253" rx="56.5" fill="none" stroke="#0d9488" stroke-opacity="0.28" stroke-width="1.5"/>
</svg>
